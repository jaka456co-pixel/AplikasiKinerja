<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-LAPKIN - Sistem Elektronik Pelaporan Kinerja</title>
	<link rel="icon" href="/favicon.ico" type="image/x-icon">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }

        .container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Trik menyembunyikan banner Google Apps Script */
		iframe {
			position: absolute;
			top: -15px; /* Menarik ke atas untuk sembunyikan banner */
			left: 0;
			width: 100%;
			height: calc(100% + 28px); /* Menambah tinggi persis sama dengan yang ditarik ke atas */
			border: none;
		}
    </style>
</head>
<body>

    <div class="container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbw1ExHsWCb9gqC-IRhooeEnkDEXyIp17TEQ70mQCvrxthujvZ6Zpa8Cg6q1gZT-dFk/exec" 
            allow="camera; microphone; geolocation"
            frameborder="0">
        </iframe>
    </div>

</body>
</html>
